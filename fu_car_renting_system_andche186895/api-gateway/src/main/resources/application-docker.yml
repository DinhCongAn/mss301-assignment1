server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: customer-service-route
              uri: lb://customer-service
              predicates:
                - Path=/auth/**,/customers/**,/admin/customers/**

            - id: car-service-route
              uri: lb://car-service
              predicates:
                - Path=/cars/**,/manufacturers/**,/suppliers/**

            - id: renting-service-route
              uri: lb://renting-service
              predicates:
                - Path=/rentings/**

          httpclient:
            connect-timeout: 3000
            response-timeout: 10s

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://eureka-server:8761/eureka/

  instance:
    prefer-ip-address: false
    hostname: api-gateway
    instance-id: ${spring.application.name}:${server.port}

    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:0123456789012345678901234567890123456789012345678901234567890123}